apiVersion: v1
kind: Namespace
metadata:
  name: play-kit-doc
  labels:
    app.kubernetes.io/name: play-kit-doc
    app.kubernetes.io/managed-by: kubectl
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: play-kit-doc
data:
  default.conf: |
    server {
      listen 80 default_server;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      gzip on;
      gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;
      gzip_min_length 256;
      gzip_proxied any;

      # 雜湊化 asset 永久 cache
      location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
      }

      # HTML 不 cache（入口檔）
      location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
      }

      # SPA fallback：未命中 asset 全 fallback 到 index.html
      # 雖然 docs 用 hash routing 嚴格說不需要，留著當保險
      location / {
        try_files $uri $uri/ /index.html;
      }

      # 安全 header（基本款）
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: play-kit-doc
  namespace: play-kit-doc
  labels:
    app.kubernetes.io/name: play-kit-doc
spec:
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: play-kit-doc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: play-kit-doc
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: dist
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /index.html
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /index.html
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: dist
          hostPath:
            path: /srv/play-kit-doc/dist
            type: Directory
        - name: nginx-config
          configMap:
            name: nginx-config
            items:
              - key: default.conf
                path: default.conf
---
apiVersion: v1
kind: Service
metadata:
  name: play-kit-doc
  namespace: play-kit-doc
  labels:
    app.kubernetes.io/name: play-kit-doc
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: play-kit-doc
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: play-kit-doc
  namespace: play-kit-doc
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-http01
    nginx.ingress.kubernetes.io/proxy-body-size: 8m
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - play-kit-doc.bwinify.com
      secretName: play-kit-doc-tls
  rules:
    - host: play-kit-doc.bwinify.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: play-kit-doc
                port:
                  number: 80
